openapi: 3.0.0
info:
  title: API Documentation
  version: 1.0.0
paths:
  /api/products:
    get:
      summary: Fetch all products with pagination support
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Specifies the page number to fetch
      responses:
        '200':
          description: A paginated list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        price:
                          type: number
                        category:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                  page:
                    type: integer
                  limit:
                    type: integer
                  totalProducts:
                    type: integer
                  totalPages:
                    type: integer
  /api/products/{id}:
    get:
      summary: Fetch a single product by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Valid MongoDB ObjectId
      responses:
        '200':
          description: A single product
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  price:
                    type: number
                  category:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid product ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid product ID
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product not found
  /api/products/category/{category}:
    get:
      summary: Fetch all products belonging to a specific category
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
          description: Name of the category
      responses:
        '200':
          description: A list of products in the specified category
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    price:
                      type: number
                    category:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
        '404':
          description: No products found in this category
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No products found in this category
        '500':
          description: Internal Server Error
  /api/products/search:
    get:
      summary: Search for products based on various criteria
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Search for products with names matching this value (case-insensitive)
        - in: query
          name: category
          schema:
            type: string
          description: Search for products in a specific category (case-insensitive)
        - in: query
          name: minPrice
          schema:
            type: number
          description: Minimum price of the products
        - in: query
          name: maxPrice
          schema:
            type: number
          description: Maximum price of the products
      responses:
        '200':
          description: A list of products matching the search criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    price:
                      type: number
                    category:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
        '500':
          description: Internal Server Error
  /api/products:
    post:
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the product
                description:
                  type: string
                  description: A description of the product
                price:
                  type: number
                  description: The price of the product
                category:
                  type: string
                  description: The category of the product
              required:
                - name
                - price
                - category
      responses:
        '201':
          description: The newly created product
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  price:
                    type: number
                  category:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Name is required
        '500':
          description: Internal Server Error
  /api/products/{id}:
    put:
      summary: Update an existing product by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Valid MongoDB ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                category:
                  type: string
      responses:
        '200':
          description: The updated product
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  price:
                    type: number
                  category:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      invalidId:
                        value: Invalid product ID
                      emptyName:
                        value: Name cannot be empty
                      invalidPrice:
                        value: Price must be a positive number
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product not found
        '500':
          description: Internal Server Error
  /api/products/{id}:
    delete:
      summary: Delete a product by its ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Valid MongoDB ObjectId
      responses:
        '200':
          description: Success message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product deleted successfully
        '400':
          description: Invalid product ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid product ID
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product not found
        '500':
          description: Internal Server Error
